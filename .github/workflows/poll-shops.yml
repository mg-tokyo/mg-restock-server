name: Restock Maintenance

on:
  schedule:
    - cron: '2/5 * * * *'
  workflow_dispatch:

concurrency:
  group: restock-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Validate Supabase secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY repository secret."
            exit 1
          fi

      - name: Snapshot current predictions
        run: |
          curl -sS -f \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/snapshot_restock_predictions" \
            -d "{}"

      - name: Score prediction outcomes
        run: |
          curl -sS -f \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/score_restock_prediction_outcomes" \
            -d "{}"

      - name: Refresh per-item model selection (daily UTC 00:00)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(date -u +%H%M)" = "0002" ]; then
            curl -sS -f \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/json" \
              -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/run_restock_item_model_backtests" \
              -d '{"p_lookback_days":90,"p_min_samples":12,"p_min_backtest_events":8,"p_max_backtest_events":40}'
          else
            echo "Skipping model backtest refresh outside daily window."
          fi

      - name: Rebuild weather summary
        run: |
          curl -sS \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/rebuild_weather_summary" \
            -d "{}"
